<svg xmlns="http://www.w3.org/2000/svg" width="740" height="480" viewBox="0 0 740 480">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-loop" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00897b"/>
    </marker>
    <marker id="arrow-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="480" fill="#fafafa"/>

  <!-- Title -->
  <text x="370" y="32" font-size="20" font-weight="700" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Phase 3: The Investigator</text>
  <text x="370" y="52" font-size="12" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">LLM investigates, Python scores. The hinge phase.</text>

  <!-- ===== parse_order ===== -->
  <!-- START -->
  <ellipse cx="70" cy="130" rx="32" ry="16" fill="#b3c0ff" stroke="#7986cb" stroke-width="1.5"/>
  <text x="70" y="135" font-size="11" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">START</text>

  <!-- Arrow -->
  <line x1="102" y1="130" x2="138" y2="130" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- parse_order -->
  <rect x="146" y="112" width="110" height="36" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5"/>
  <text x="201" y="134" font-size="12" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">parse_order</text>

  <!-- Arrow -->
  <line x1="256" y1="130" x2="282" y2="130" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== INVESTIGATION LOOP ===== -->
  <rect x="275" y="80" width="310" height="180" rx="12" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="430" y="100" font-size="10" font-weight="600" fill="#00897b" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Investigation loop</text>

  <!-- call_llm -->
  <rect x="290" y="112" width="120" height="44" rx="8" fill="#3949ab" stroke="#283593" stroke-width="2"/>
  <text x="350" y="136" font-size="13" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">call_llm</text>
  <text x="350" y="150" font-size="9" fill="#c5cae9" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Sonnet</text>

  <!-- Decision diamond: should_continue -->
  <polygon points="462,134 498,110 534,134 498,158" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="498" y="131" font-size="7" font-weight="600" fill="#e65100" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">should</text>
  <text x="498" y="141" font-size="7" font-weight="600" fill="#e65100" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">continue?</text>

  <!-- Arrow: call_llm -> diamond -->
  <line x1="410" y1="134" x2="455" y2="134" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- execute_tools (below diamond) -->
  <rect x="430" y="190" width="130" height="50" rx="8" fill="#00897b" stroke="#00695c" stroke-width="2"/>
  <text x="495" y="213" font-size="12" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">execute_tools</text>
  <text x="495" y="228" font-size="8" fill="#b2dfdb" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">validate args, create Evidence</text>
  <text x="495" y="238" font-size="7" fill="#80cbc4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">(custom — replaces prebuilt ToolNode)</text>

  <!-- Arrow: diamond -> execute_tools (has tool calls) -->
  <path d="M498,158 L498,183" fill="none" stroke="#00897b" stroke-width="2" marker-end="url(#arrow-loop)"/>
  <text x="515" y="175" font-size="8" fill="#00897b" font-weight="600" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">tool calls</text>

  <!-- Arrow: execute_tools -> call_llm (loop back) -->
  <path d="M430,215 Q370,215 352,162" fill="none" stroke="#00897b" stroke-width="2" marker-end="url(#arrow-loop)"/>

  <!-- ===== EXIT LOOP ===== -->
  <!-- Arrow: diamond -> assess_risk (done) -->
  <path d="M534,134 Q580,134 600,160 Q620,186 620,220" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-light)"/>
  <text x="584" y="148" font-size="8" fill="#888" font-weight="600" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">done</text>

  <!-- assess_risk -->
  <rect x="555" y="228" width="130" height="50" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="620" y="251" font-size="12" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">assess_risk</text>
  <text x="620" y="267" font-size="8" fill="#888" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Deterministic scoring</text>

  <!-- Arrow: assess_risk -> format_report -->
  <line x1="620" y1="278" x2="620" y2="308" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- format_report -->
  <rect x="555" y="316" width="130" height="36" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5"/>
  <text x="620" y="338" font-size="12" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">format_report</text>

  <!-- Arrow: format_report -> END -->
  <line x1="620" y1="352" x2="620" y2="380" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- END -->
  <ellipse cx="620" cy="398" rx="28" ry="16" fill="#b3c0ff" stroke="#7986cb" stroke-width="1.5"/>
  <text x="620" y="403" font-size="11" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">END</text>

  <!-- ===== EVIDENCE + SCORING ===== -->
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#fff" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="140" y="20" font-size="10" font-weight="700" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Evidence-Driven Scoring</text>
    <text x="140" y="38" font-size="9" fill="#888" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">LLM investigates → Evidence[ ] accumulates</text>
    <text x="140" y="52" font-size="9" fill="#888" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Python scores → base(20) + sum(weight x confidence)</text>
    <text x="140" y="68" font-size="8" fill="#aaa" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Every score traces to specific tool outputs</text>
  </g>

  <!-- ===== TOOLS LIST ===== -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="140" y="18" font-size="10" font-weight="700" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">5 Tools</text>
    <text x="16" y="36" font-size="9" fill="#00897b" text-anchor="start" font-family="monospace">check_customer_history</text>
    <text x="16" y="49" font-size="9" fill="#00897b" text-anchor="start" font-family="monospace">verify_shipping_address</text>
    <text x="16" y="62" font-size="9" fill="#00897b" text-anchor="start" font-family="monospace">check_payment_pattern</text>
    <text x="190" y="36" font-size="9" fill="#00897b" text-anchor="start" font-family="monospace">search_fraud_database</text>
    <text x="190" y="49" font-size="9" fill="#00897b" text-anchor="start" font-family="monospace">calculate_risk_score</text>
    <text x="190" y="70" font-size="8" fill="#aaa" text-anchor="start" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">+2 new tools (Phase 2 had 3)</text>
  </g>

</svg>