<svg xmlns="http://www.w3.org/2000/svg" width="880" height="780" viewBox="0 0 880 780">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
    <marker id="arrow-bold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-evidence" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b8e6b"/>
    </marker>

    <!-- Person silhouette (reusable) -->
    <symbol id="person" viewBox="0 0 40 56">
      <circle cx="20" cy="12" r="10" fill="currentColor"/>
      <path d="M4,56 Q4,30 20,26 Q36,30 36,56 Z" fill="currentColor"/>
    </symbol>

    <!-- LLM brain icon (reusable) -->
    <symbol id="brain" viewBox="0 0 28 28">
      <path d="M14,2 C8,2 4,6 4,10 C4,12 5,14 7,15 C5,16 4,18 4,20 C4,24 8,26 12,26 L16,26 C20,26 24,24 24,20 C24,18 23,16 21,15 C23,14 24,12 24,10 C24,6 20,2 14,2Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M14,6 C11,8 11,12 14,14 C17,12 17,8 14,6Z" fill="none" stroke="currentColor" stroke-width="1"/>
      <path d="M9,12 Q14,16 19,12" fill="none" stroke="currentColor" stroke-width="1"/>
      <path d="M10,18 Q14,22 18,18" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="8" cy="8" r="1.2" fill="currentColor"/>
      <circle cx="20" cy="8" r="1.2" fill="currentColor"/>
      <circle cx="7" cy="22" r="1" fill="currentColor"/>
      <circle cx="21" cy="22" r="1" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="880" height="780" fill="#fafafa"/>

  <!-- Title -->
  <text x="440" y="35" font-size="20" font-weight="700" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Multi-Agent Fraud Investigation</text>
  <text x="440" y="55" font-size="12" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Supervisor coordinates specialists. Evidence flows through shared state.</text>

  <!-- ===== PARSE ORDER ===== -->
  <rect x="375" y="75" width="130" height="36" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5"/>
  <text x="440" y="97" font-size="13" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Parse Order</text>

  <!-- Arrow: parse_order -> supervisor -->
  <line x1="440" y1="111" x2="440" y2="148" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow-bold)"/>

  <!-- ===== SUPERVISOR ===== -->
  <g transform="translate(440, 210)">
    <rect x="-90" y="-48" width="180" height="96" rx="12" fill="#3949ab" stroke="#283593" stroke-width="2"/>
    <use href="#person" x="-70" y="-40" width="30" height="42" style="color: #7986cb"/>
    <use href="#brain" x="42" y="-38" width="28" height="28" style="color: #b3c0ff"/>
    <text x="0" y="5" font-size="15" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Supervisor</text>
    <text x="0" y="22" font-size="9" font-weight="600" fill="#c5cae9" text-anchor="middle" letter-spacing="0.5px" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CLAUDE SONNET</text>
    <text x="0" y="36" font-size="9" fill="#9fa8da" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">4 routing tools</text>
  </g>

  <!-- ===== SPECIALISTS ===== -->

  <!-- Customer Analyst -->
  <g transform="translate(140, 410)">
    <rect x="-95" y="-48" width="190" height="96" rx="12" fill="#00897b" stroke="#00695c" stroke-width="2"/>
    <use href="#person" x="-78" y="-40" width="26" height="36" style="color: #4db6ac"/>
    <use href="#brain" x="52" y="-36" width="22" height="22" style="color: #b2dfdb"/>
    <text x="0" y="5" font-size="14" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Customer Analyst</text>
    <text x="0" y="22" font-size="9" font-weight="600" fill="#b2dfdb" text-anchor="middle" letter-spacing="0.5px" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CLAUDE HAIKU</text>
    <text x="0" y="36" font-size="9" fill="#80cbc4" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">check_history, fraud_db</text>
  </g>

  <!-- Address Analyst -->
  <g transform="translate(440, 410)">
    <rect x="-95" y="-48" width="190" height="96" rx="12" fill="#00897b" stroke="#00695c" stroke-width="2"/>
    <use href="#person" x="-78" y="-40" width="26" height="36" style="color: #4db6ac"/>
    <use href="#brain" x="52" y="-36" width="22" height="22" style="color: #b2dfdb"/>
    <text x="0" y="5" font-size="14" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Address Analyst</text>
    <text x="0" y="22" font-size="9" font-weight="600" fill="#b2dfdb" text-anchor="middle" letter-spacing="0.5px" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CLAUDE HAIKU</text>
    <text x="0" y="36" font-size="9" fill="#80cbc4" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">verify_address</text>
  </g>

  <!-- Payment Analyst -->
  <g transform="translate(740, 410)">
    <rect x="-95" y="-48" width="190" height="96" rx="12" fill="#00897b" stroke="#00695c" stroke-width="2"/>
    <use href="#person" x="-78" y="-40" width="26" height="36" style="color: #4db6ac"/>
    <use href="#brain" x="52" y="-36" width="22" height="22" style="color: #b2dfdb"/>
    <text x="0" y="5" font-size="14" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Payment Analyst</text>
    <text x="0" y="22" font-size="9" font-weight="600" fill="#b2dfdb" text-anchor="middle" letter-spacing="0.5px" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CLAUDE HAIKU</text>
    <text x="0" y="36" font-size="9" fill="#80cbc4" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">check_payment</text>
  </g>

  <!-- ===== EDGES: Supervisor -> Specialists (consult) ===== -->
  <path d="M365,248 Q250,310 158,362" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow-bold)"/>
  <text x="242" y="296" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">consult</text>

  <line x1="440" y1="258" x2="440" y2="362" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow-bold)"/>
  <text x="458" y="310" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">consult</text>

  <path d="M515,248 Q630,310 722,362" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow-bold)"/>
  <text x="638" y="296" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">consult</text>

  <!-- ===== EDGES: Specialists -> Supervisor (evidence) ===== -->
  <path d="M178,362 Q290,305 370,240" fill="none" stroke="#6b8e6b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-evidence)"/>
  <text x="262" y="318" font-size="9" fill="#6b8e6b" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">evidence</text>

  <line x1="425" y1="362" x2="425" y2="262" fill="none" stroke="#6b8e6b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-evidence)"/>

  <path d="M702,362 Q590,305 510,240" fill="none" stroke="#6b8e6b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-evidence)"/>
  <text x="620" y="318" font-size="9" fill="#6b8e6b" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">evidence</text>

  <!-- ===== ASSESS RISK ===== -->
  <path d="M440,258 Q440,490 440,522" fill="none" stroke="#4a5568" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-bold)"/>
  <text x="460" y="508" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">finalize</text>

  <rect x="365" y="530" width="150" height="42" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="440" y="550" font-size="13" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Assess Risk</text>
  <text x="440" y="563" font-size="9" fill="#555" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Deterministic scoring</text>

  <!-- ===== DECISION BRANCH ===== -->
  <path d="M390,572 Q320,610 320,630" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="325" y="608" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">approve / reject</text>

  <path d="M490,572 Q560,610 560,625" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="558" y="608" font-size="9" fill="#666" text-anchor="middle" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">review (50-79)</text>

  <!-- ===== HUMAN REVIEW ===== -->
  <g transform="translate(560, 672)">
    <rect x="-75" y="-38" width="150" height="76" rx="10" fill="#e65100" stroke="#bf360c" stroke-width="2"/>
    <use href="#person" x="-15" y="-32" width="30" height="42" style="color: #ff8a65"/>
    <text x="0" y="18" font-size="13" font-weight="600" fill="white" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Human Review</text>
    <text x="0" y="32" font-size="9" font-weight="600" fill="#ffccbc" text-anchor="middle" letter-spacing="0.5px" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">HITL INTERRUPT</text>
  </g>

  <!-- Human Review -> Format Report -->
  <path d="M498,682 Q420,700 350,700" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== FORMAT REPORT ===== -->
  <rect x="250" y="640" width="140" height="36" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5"/>
  <text x="320" y="662" font-size="13" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Format Report</text>

  <!-- Format Report -> END -->
  <line x1="320" y1="676" x2="320" y2="725" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <ellipse cx="320" cy="742" rx="35" ry="16" fill="#b3c0ff" stroke="#7986cb" stroke-width="1.5"/>
  <text x="320" y="747" font-size="12" font-weight="600" fill="#1a1a2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">END</text>

  <!-- ===== SHARED STATE ===== -->
  <g transform="translate(20, 530)">
    <rect x="0" y="0" width="195" height="90" rx="8" fill="#fff" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="97" y="20" font-size="10" font-weight="700" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Shared State</text>
    <text x="97" y="38" font-size="9" fill="#888" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">evidence [ ]  (append-only)</text>
    <text x="97" y="52" font-size="9" fill="#888" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">specialist_log [ ]</text>
    <text x="97" y="66" font-size="9" fill="#888" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">messages, risk_score, decision</text>
    <text x="97" y="82" font-size="8" fill="#aaa" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Every node reads from and writes to state</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(668, 530)">
    <rect x="0" y="0" width="195" height="120" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="97" y="20" font-size="10" font-weight="700" fill="#666" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Legend</text>

    <rect x="14" y="30" width="28" height="14" rx="4" fill="#3949ab"/>
    <text x="56" y="42" font-size="9" fill="#555" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Supervisor (Sonnet — reasons)</text>

    <rect x="14" y="52" width="28" height="14" rx="4" fill="#00897b"/>
    <text x="56" y="64" font-size="9" fill="#555" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Specialists (Haiku — executes)</text>

    <rect x="14" y="74" width="28" height="14" rx="4" fill="#e65100"/>
    <text x="56" y="86" font-size="9" fill="#555" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Human Review (no LLM)</text>

    <rect x="14" y="96" width="28" height="14" rx="4" fill="#e8eaf6" stroke="#7986cb" stroke-width="0.5"/>
    <text x="56" y="108" font-size="9" fill="#555" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Infrastructure (deterministic)</text>
  </g>

</svg>